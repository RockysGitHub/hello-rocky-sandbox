<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Hello Rocky</title>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
        <style>
            :root{
                --bg-1:#06070a;
                --bg-2:#0b0f17;
                --accent:#00e6ff;
                --accent-2:#8a3cff;
                --muted:#9aa4b2;
            }
            html,body{height:100%;}
            body{
                margin:0;padding:0;min-height:100%;
                font-family:Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
                background: radial-gradient(1200px 600px at 10% 10%, rgba(138,60,255,0.08), transparent 10%),
                                        radial-gradient(900px 400px at 90% 90%, rgba(0,230,255,0.05), transparent 10%),
                                        linear-gradient(180deg,var(--bg-1),var(--bg-2));
                color:#e6eef6;display:flex;align-items:center;justify-content:center;padding:32px;overflow:hidden;
            }
            .stars{position:fixed;inset:0;pointer-events:none;background-image:radial-gradient(#ffffff07 1px, transparent 1px);background-size:60px 60px;opacity:0.6;mix-blend-mode:screen}
            .container{width:100%;max-width:980px;padding:36px;border-radius:16px;background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));box-shadow:0 6px 30px rgba(2,6,23,0.6);backdrop-filter: blur(8px);border:1px solid rgba(255,255,255,0.04);}
            header{display:flex;align-items:center;gap:20px}
            .logo{width:84px;height:84px;border-radius:12px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--accent),var(--accent-2));font-family:Orbitron, sans-serif;font-weight:700;color:#041018;font-size:20px}
            h1{font-family:Orbitron, sans-serif;margin:0;font-size:28px;color:var(--accent-2);text-shadow:0 6px 30px rgba(138,60,255,0.08)}
            p.lead{margin:8px 0 0;color:var(--muted);font-size:15px}
            .content{display:flex;gap:28px;margin-top:26px;align-items:flex-start}
            .panel{flex:1;padding:20px;border-radius:12px;background:linear-gradient(180deg, rgba(255,255,255,0.015), rgba(255,255,255,0.01));border:1px solid rgba(255,255,255,0.03)}
            .panel h2{margin:0 0 12px;font-size:16px;color:#dfe9ff}
            .controls{display:flex;gap:12px;flex-wrap:wrap}
            .btn{padding:10px 14px;border-radius:10px;border:none;cursor:pointer;font-weight:600;background:transparent;color:var(--accent);border:1px solid rgba(0,230,255,0.12);transition:transform .16s ease,box-shadow .16s ease}
            .btn.ghost{color:var(--muted);border-color:rgba(255,255,255,0.04)}
            .btn:hover{transform:translateY(-3px);box-shadow:0 8px 30px rgba(0,230,255,0.06)}
            .meter{height:10px;background:linear-gradient(90deg,#0a0f14 0%, rgba(255,255,255,0.02) 100%);border-radius:999px;overflow:hidden}
            .meter > i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-2));width:64%}
            .footer{display:flex;justify-content:space-between;align-items:center;margin-top:18px;color:var(--muted);font-size:13px}
            .neon{color:var(--accent);text-shadow:0 0 12px rgba(0,230,255,0.18),0 2px 12px rgba(138,60,255,0.04)}
            @keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.02)}100%{transform:scale(1)}}
            .logo{animation:pulse 4s ease-in-out infinite}
            @media (max-width:720px){.content{flex-direction:column}.logo{width:64px;height:64px;font-size:16px}.container{padding:20px}}
        </style>
    </head>
    <body>
        <div class="stars" aria-hidden="true"></div>
        <div class="container">
            <header>
                <div class="logo">RK</div>
                <div>
                    <h1>Hello, Rocky</h1>
                    <p class="lead">The new builder stack is alive — welcome to your dark futuristic playground.</p>
                </div>
            </header>
            <div class="content">
                <section class="panel">
                    <h2 class="neon">System Status</h2>
                    <p style="margin:0 0 12px;color:var(--muted)">All systems nominal. Core telemetry within expected parameters.</p>
                    <div style="display:flex;align-items:center;gap:12px">
                        <div style="flex:1">
                            <div class="meter" aria-hidden="true"><i></i></div>
                        </div>
                        <div style="min-width:80px;text-align:right;color:var(--muted)">64%</div>
                    </div>
                </section>
                <aside class="panel" style="width:300px;min-width:220px">
                    <h2>Quick Actions</h2>
                    <div class="controls" style="margin-top:8px">
                        <button class="btn">Launch</button>
                        <button class="btn ghost">Configure</button>
                        <button class="btn ghost">Logs</button>
                    </div>
                    <div class="footer">
                        <div>v1.0</div>
                        <div style="color:var(--muted)">Ready</div>
                    </div>
                </aside>
            </div>
        </div>
    </body>
</html>
