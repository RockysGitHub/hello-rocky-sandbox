<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello Rocky</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #050816, #0f172a);
            color: #e2e8f0;
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            background: rgba(15, 23, 42, 0.9);
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
            max-width: 700px;
        }

        h1 {
            font-size: 3rem;
            color: #38bdf8;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #cbd5e1;
        }

        button {
            background: #06b6d4;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1rem;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s ease;
        }

        button:hover {
            background: #0891b2;
            transform: scale(1.05);
        }

        .version {
            margin-top: 30px;
            font-size: 1rem;
            color: #94a3b8;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Hello Rocky</h1>

        <p>The new builder stack is alive.</p>

        <button>Click Me</button>

        <p class="version">
            Version 2 - Rocky is learning AI-assisted development.
        </p>
    </div>

</body>
</html>
